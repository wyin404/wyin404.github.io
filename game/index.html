<script>
  (function() {
    // ==================== DOM 元素 ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const loadingStatus = document.getElementById('loadingStatus');
    const soundToggle = document.getElementById('soundToggle');
    // ==================== 自定义音频文件 ====================
    // 请将您的音频文件放在同目录下，或修改为完整路径
    const startSound = new Audio('start.wav');        // 开始音效
    const gameOverSound = new Audio('gameover.wav');  // 结束音效
    // 如果音频文件加载失败，静默处理
    startSound.load();
    gameOverSound.load();
    // ==================== 音效系统 ====================
    let soundEnabled = true;
    let audioUnlocked = false;
    // 解锁音频（浏览器自动播放策略）
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        // 尝试播放一个静音片段来激活音频
        const silent = new Audio();
        silent.volume = 0;
        silent.play().then(() => {
          audioUnlocked = true;
        }).catch(() => {
          // 忽略错误
        });
      } catch (e) {
        // 忽略
      }
    }
    // 播放开始音效
    function playStartSound() {
      if (!soundEnabled) return;
      try {
        startSound.currentTime = 0;
        startSound.play().catch(() => {});
      } catch (e) {
        // 忽略音频错误
      }
    }
    // 播放结束音效
    function playGameOverSound() {
      if (!soundEnabled) return;
      try {
        gameOverSound.currentTime = 0;
        gameOverSound.play().catch(() => {});
      } catch (e) {
        // 忽略音频错误
      }
    }
    // ==================== 自定义贴图 ====================
    const IMAGE_URLS = {
      player: '/images/fu.png',
      ground: '/images/ground.png',
      background: '/images/bg.png',
      cactus: '/images/pu.png',
      pterodactyl: '/images/pu.png',
    };
    // ==================== 加载图片 ====================
    const images = {};
    let imagesLoaded = 0;
    const totalImages = Object.keys(IMAGE_URLS).length;
    function loadImages(callback) {
      for (const [key, url] of Object.entries(IMAGE_URLS)) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = url;
        img.onload = () => {
          imagesLoaded++;
          loadingStatus.textContent = `贴图加载中... ${imagesLoaded}/${totalImages}`;
          if (imagesLoaded === totalImages) {
            loadingStatus.textContent = '🎮 点击开始游戏！';
            callback();
          }
        };
        img.onerror = () => {
          console.warn(`图片加载失败: ${key}，使用后备颜色`);
          imagesLoaded++;
          loadingStatus.textContent = `贴图加载中... ${imagesLoaded}/${totalImages}`;
          if (imagesLoaded === totalImages) {
            loadingStatus.textContent = '🎮 点击开始游戏！';
            callback();
          }
        };
        images[key] = img;
      }
    }
    // ==================== 游戏常量 ====================
    const GROUND_Y = 350;
    const DINO_X = 70;
    // ==================== 游戏状态 ====================
    let gameOver = false;
    let gamePaused = true;        // 初始为暂停
    let score = 0;
    let frame = 0;
    let gameReady = false;
    // ==================== 恐龙（玩家） ====================
    const dino = {
      x: DINO_X,
      y: GROUND_Y - 50,
      width: 42,
      height: 50,
      vy: 0,
      gravity: 0.75,
      jumpPower: -15,
      grounded: true,
    };
    // ==================== 障碍物 ====================
    let obstacles = [];
    // ==================== 核心函数 ====================
    // 开始游戏（从暂停状态恢复）
    function startGame() {
      if (!gameReady) return;
      if (gamePaused && !gameOver) {
        gamePaused = false;
        unlockAudio();
        playStartSound();
        loadingStatus.textContent = '🎮 游戏进行中...';
      }
    }
    // 重置游戏
    function resetGame() {
      if (!gameReady) return;
      gameOver = false;
      gamePaused = true;          // 重置后回到暂停
      score = 0;
      frame = 0;
      obstacles = [];
      dino.y = GROUND_Y - dino.height;
      dino.vy = 0;
      dino.grounded = true;
      updateScoreDisplay();
      loadingStatus.textContent = '🎮 点击开始游戏！';
    }
    // 跳跃
    function jump() {
      unlockAudio();
      // 如果游戏暂停，开始游戏
      if (gamePaused && !gameOver && gameReady) {
        startGame();
        return;
      }
      if (gameOver || !gameReady) return;
      if (dino.grounded) {
        dino.vy = dino.jumpPower;
        dino.grounded = false;
      }
    }
    // 更新分数显示
    function updateScoreDisplay() {
      scoreSpan.textContent = Math.floor(score);
    }
    // ==================== 生成障碍物 ====================
    function spawnObstacle() {
      const type = Math.random() < 0.3 ? 'pterodactyl' : 'cactus';
      if (type === 'cactus') {
        const heights = [32, 48, 60];
        const h = heights[Math.floor(Math.random() * heights.length)];
        obstacles.push({
          type: 'cactus',
          x: 700,
          y: GROUND_Y - h,
          width: 26,
          height: h,
        });
      } else {
        const flyY = GROUND_Y - 70 - Math.random() * 40;
        obstacles.push({
          type: 'pterodactyl',
          x: 700,
          y: flyY,
          width: 46,
          height: 32,
          wingPhase: 0,
        });
      }
    }
    // ==================== 更新逻辑 ====================
    function update() {
      // 暂停或游戏结束时不更新
      if (gamePaused || gameOver || !gameReady) return;
      // 恐龙物理
      dino.vy += dino.gravity;
      dino.y += dino.vy;
      if (dino.y >= GROUND_Y - dino.height) {
        dino.y = GROUND_Y - dino.height;
        dino.vy = 0;
        dino.grounded = true;
      } else {
        dino.grounded = false;
      }
      if (dino.y < 0) {
        dino.y = 0;
        dino.vy = 0;
      }
      // 障碍物移动
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const ob = obstacles[i];
        ob.x -= 5.5;
        if (ob.x + ob.width < 0) {
          obstacles.splice(i, 1);
          continue;
        }
        if (ob.type === 'pterodactyl') {
          ob.wingPhase = (ob.wingPhase || 0) + 0.2;
        }
      }
      // 生成障碍物
      const minInterval = Math.max(30, 65 - Math.floor(score / 70));
      if (frame % minInterval === 0 && !gameOver && Math.random() < 0.65) {
        spawnObstacle();
      }
      // 碰撞检测
      const dinoRect = {
        x: dino.x + 5,
        y: dino.y + 5,
        width: dino.width - 10,
        height: dino.height - 10,
      };
      for (let ob of obstacles) {
        let obRect = {
          x: ob.x + 4,
          y: ob.y + 4,
          width: ob.width - 8,
          height: ob.height - 8,
        };
        if (ob.type === 'pterodactyl') {
          obRect.x += 5;

        return;

        unlockAudio();

    loadImages(() => {

      resetGame();  // 默认暂停状态

    gameLoop();
